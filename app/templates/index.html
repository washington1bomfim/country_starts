<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>country_starts | Radio Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-orb orb-left"></div>
  <div class="bg-orb orb-right"></div>

  <main class="layout">
    <header class="hero">
      <p class="eyebrow">Country Radio Analytics</p>
      <h1>country_starts</h1>
      <p>Insights diários das playlists CKDKFM e CKRYFM com persistência em PostgreSQL.</p>
      <button id="runIngestion" class="cta">Rodar ingestão de ontem</button>
      <p id="ingestionStatus" class="status"></p>
    </header>

    <section class="panel">
      <h2>Intervalo de análise</h2>
      <div class="controls grid-3">
        <label>
          Data inicial
          <input type="date" id="startDate" />
        </label>
        <label>
          Data final
          <input type="date" id="endDate" />
        </label>
        <div class="inline-group">
          <label>
            Top artistas
            <input type="number" min="1" max="100" value="10" id="topArtistsLimit" />
          </label>
          <button id="loadTopArtists">Atualizar</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="topArtistsChart"></canvas>
      </div>
      <div id="topArtistsResults" class="result-box"></div>
    </section>

    <section class="panel">
      <h2>Músicas dos artistas mais tocados</h2>
      <div class="controls grid-3">
        <label>
          Limite de artistas
          <input type="number" min="1" max="50" value="5" id="artistLimit" />
        </label>
        <label>
          Limite de músicas
          <input type="number" min="1" max="200" value="20" id="songLimit" />
        </label>
        <button id="loadSongsByArtists">Consultar</button>
      </div>
      <div class="chart-container">
        <canvas id="songsByArtistsChart"></canvas>
      </div>
      <div id="songsByArtistsResults" class="result-box"></div>
    </section>

    <section class="panel">
      <h2>Quem mais tocou na data</h2>
      <div class="controls grid-3">
        <label>
          Data
          <input type="date" id="singleDate" />
        </label>
        <button id="loadDateStats">Atualizar data</button>
      </div>
      <div class="split">
        <article>
          <h3>Artista do dia</h3>
          <div id="topArtistOnDateResults" class="result-box"></div>
        </article>
        <article>
          <h3>Música do dia</h3>
          <div id="topSongOnDateResults" class="result-box"></div>
        </article>
      </div>
    </section>

    <section class="panel">
      <h2>Performance de artista em data específica</h2>
      <div class="controls grid-3">
        <label>
          Artista
          <input type="text" id="artistName" placeholder="Ex.: Jess Moskaluke" />
        </label>
        <label>
          Data
          <input type="date" id="artistDate" />
        </label>
        <button id="loadArtistDate">Consultar artista</button>
      </div>
      <p id="artistTotal" class="status"></p>
      <div id="artistSongsResults" class="result-box"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
